{# M4: Add Task Modal - full-screen on mobile, overlay on desktop #}
<div id="mob-m4-modal" style="display:none" class="mob-fullscreen-modal">
  <div class="p-4 bg-white border-b border-surf-200 flex items-center justify-between shrink-0">
    <h2 class="text-lg font-bold text-navy-900">Add Task</h2>
    <button onclick="this.closest('#mob-m4-modal').style.display='none'" class="p-2 rounded-lg hover:bg-surf-50">
      <svg class="w-5 h-5 text-surf-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="modal-body space-y-4">
    <input type="hidden" id="m4-aircraft-id" value="{{ selected_ac_id or '' }}"/>
    <input type="hidden" id="m4-meeting-date" value="{{ meeting_date or '' }}"/>
    <input type="hidden" id="m4-search-filter" value="{{ search_filter or '' }}"/>
    <input type="hidden" id="m4-status-filter" value="{{ status_filter or '' }}"/>
    <input type="hidden" id="m4-quick-filter" value="{{ quick_filter or '' }}"/>
    <div>
      <div class="mob-label">Description</div>
      <textarea id="m4-task-text" class="inp w-full text-base h-24 resize-none" placeholder="Task description..." required></textarea>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <div class="mob-label">Status</div>
        <select id="m4-status" class="inp w-full h-12 text-base">
          <option value="NOT_STARTED">Not Started</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="WAITING">Waiting</option>
        </select>
      </div>
      <div>
        <div class="mob-label">Deadline</div>
        <input type="date" id="m4-deadline" class="inp w-full h-12 text-base"/>
      </div>
    </div>
    <div class="grid grid-cols-1 gap-3">
      <div>
        <div class="mob-label">Shop</div>
        <select id="m4-shop-id" class="inp w-full h-12 text-base" onchange="m4SyncWorkerOptions()">
          <option value="">Select shop</option>
          {% for shop in shop_options %}
          <option value="{{ shop.id }}" {% if create_shop_id == shop.id %}selected{% endif %}>{{ shop.code }}{% if shop.name %} - {{ shop.name }}{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <div class="mob-label">RFO</div>
        <select id="m4-wp-id" class="inp w-full h-12 text-base">
          <option value="">Optional</option>
          {% for wp in work_package_options %}
          <option value="{{ wp.id }}" {% if create_work_package_id == wp.id %}selected{% endif %}>{{ wp.rfo_no or 'No RFO' }}{% if wp.title %} - {{ wp.title }}{% endif %}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <div class="mob-label">Planned MH</div>
        <input type="number" id="m4-planned-mh" class="inp w-full h-12 text-base" step="0.5" min="0" placeholder="0.0"/>
      </div>
      <div>
        <div class="mob-label">Assign Worker</div>
        <select id="m4-worker" class="inp w-full h-12 text-base" {% if create_shop_id is none %}disabled{% endif %}>
          {% if create_shop_id is none %}
          <option value="">Select shop first</option>
          {% else %}
          <option value="">Unassigned</option>
          {% for w in workers_by_shop.get(create_shop_id, []) %}
          <option value="{{ w.id }}">{{ w.name }}</option>
          {% endfor %}
          {% endif %}
        </select>
      </div>
    </div>
    <div>
      <div class="mob-label">Remarks</div>
      <textarea id="m4-remarks" class="inp w-full text-base h-16 resize-none" placeholder="Optional remarks..."></textarea>
    </div>
  </div>
  <div class="modal-footer flex gap-3">
    <button type="button" class="btn-outline flex-1 h-12 text-base" onclick="this.closest('#mob-m4-modal').style.display='none'">Cancel</button>
    <button type="button" id="m4-add-task-btn" class="btn-primary flex-1 h-12 text-base font-semibold" onclick="mobCreateTask()">Add Task</button>
  </div>
</div>
<script>
var mobCreateTaskInFlight = false;
var M4_WORKERS_BY_SHOP = {{ workers_by_shop | tojson }};

function m4GetErrorMessage(payload, fallback) {
  if (!payload) return fallback;
  if (typeof payload === 'string') return payload;
  if (typeof payload.detail === 'string') return payload.detail;
  if (Array.isArray(payload.detail) && payload.detail.length) {
    var first = payload.detail[0];
    if (typeof first === 'string') return first;
    if (first && typeof first.msg === 'string') return first.msg;
  }
  if (typeof payload.message === 'string') return payload.message;
  return fallback;
}

function m4SetButtonBusy(button, busy, busyText) {
  if (typeof setTaskEntryButtonBusy === 'function') {
    setTaskEntryButtonBusy(button, busy, busyText);
    return;
  }
  if (!button) return;
  if (busy) {
    button.dataset.prevDisabled = button.disabled ? '1' : '0';
    button.dataset.prevText = button.textContent;
    button.disabled = true;
    button.classList.add('opacity-60', 'cursor-not-allowed');
    if (busyText) button.textContent = busyText;
    return;
  }
  button.disabled = button.dataset.prevDisabled === '1';
  button.classList.remove('opacity-60', 'cursor-not-allowed');
  if (button.dataset.prevText) button.textContent = button.dataset.prevText;
}

function m4WorkersForShop(shopId) {
  if (shopId === '' || shopId === null || shopId === undefined) return [];
  return M4_WORKERS_BY_SHOP[String(shopId)] || M4_WORKERS_BY_SHOP[shopId] || [];
}

function m4SetWorkerOptions(selectedValue) {
  var shopId = (document.getElementById('m4-shop-id') || {}).value || '';
  var workerSelect = document.getElementById('m4-worker');
  if (!workerSelect) return;
  var currentValue = selectedValue !== undefined ? selectedValue : workerSelect.value;
  workerSelect.innerHTML = '';
  if (!shopId) {
    workerSelect.disabled = true;
    var emptyOpt = document.createElement('option');
    emptyOpt.value = '';
    emptyOpt.textContent = 'Select shop first';
    workerSelect.appendChild(emptyOpt);
    return;
  }
  workerSelect.disabled = false;
  var blankOpt = document.createElement('option');
  blankOpt.value = '';
  blankOpt.textContent = 'Unassigned';
  workerSelect.appendChild(blankOpt);
  m4WorkersForShop(shopId).forEach(function(worker) {
    var opt = document.createElement('option');
    opt.value = String(worker.id);
    opt.textContent = worker.name;
    if (String(worker.id) === String(currentValue || '')) opt.selected = true;
    workerSelect.appendChild(opt);
  });
}

function m4SyncWorkerOptions() {
  m4SetWorkerOptions();
}

async function m4RequestJson(url, options) {
  if (typeof taskEntryRequestJson === 'function') {
    return taskEntryRequestJson(url, options || {});
  }
  var opts = options || {};
  var method = opts.method || 'GET';
  var headers = {'X-CSRFToken': (document.cookie.match(/csrftoken=([^;]+)/) || [])[1] || ''};
  var body;
  if (opts.json !== undefined) {
    headers['Content-Type'] = 'application/json';
    body = JSON.stringify(opts.json);
  } else if (opts.formData) {
    body = opts.formData;
  }

  var res = await fetch(url, { method: method, headers: headers, body: body, credentials: 'same-origin' });
  var raw = await res.text();
  var data = {};
  if (raw) {
    try { data = JSON.parse(raw); } catch (_) { data = { detail: raw }; }
  }
  if (!res.ok) {
    var err = new Error(m4GetErrorMessage(data, 'Request failed'));
    err.status = res.status;
    err.payload = data;
    throw err;
  }
  return data;
}

async function mobCreateTask() {
  if (mobCreateTaskInFlight) return;

  var taskText = (document.getElementById('m4-task-text').value || '').trim();
  if (!taskText) {
    showToast('Error', 'Task description is required', 'red');
    return;
  }

  var aircraftId = parseInt(document.getElementById('m4-aircraft-id').value || '', 10);
  var shopId = parseInt(document.getElementById('m4-shop-id').value || '', 10);
  var meetingDate = (document.getElementById('m4-meeting-date').value || '').trim();
  if (!Number.isFinite(aircraftId) || !Number.isFinite(shopId) || !meetingDate) {
    showToast('Error', 'Aircraft, shop, and meeting date are required.', 'red');
    return;
  }

  var plannedMhRaw = (document.getElementById('m4-planned-mh').value || '').trim();
  var plannedMh = plannedMhRaw ? parseFloat(plannedMhRaw) : null;
  if (plannedMhRaw && !Number.isFinite(plannedMh)) {
    showToast('Error', 'Planned MH must be a number.', 'red');
    return;
  }

  var wpRaw = (document.getElementById('m4-wp-id').value || '').trim();
  var wpId = wpRaw ? parseInt(wpRaw, 10) : null;

  var payload = {
    task_text: taskText,
    status: document.getElementById('m4-status').value,
    aircraft_id: aircraftId,
    shop_id: shopId,
    meeting_date: meetingDate,
    work_package_id: Number.isFinite(wpId) ? wpId : undefined,
    planned_mh: plannedMh,
    deadline_date: document.getElementById('m4-deadline').value || undefined,
    remarks: document.getElementById('m4-remarks').value || undefined
  };

  Object.keys(payload).forEach(function (k) {
    if (payload[k] === undefined || payload[k] === null || payload[k] === '') delete payload[k];
  });

  var submitBtn = document.getElementById('m4-add-task-btn');
  mobCreateTaskInFlight = true;
  m4SetButtonBusy(submitBtn, true, 'Adding...');

  try {
    var created = await m4RequestJson('/api/tasks', {
      method: 'POST',
      json: payload
    });

    var workerRaw = document.getElementById('m4-worker').value;
    if (workerRaw) {
      await m4RequestJson('/api/tasks/' + created.task_id + '/assign-worker', {
        method: 'PATCH',
        json: { assigned_worker_id: parseInt(workerRaw, 10) }
      });
    }

    showToast('Created', 'Task added successfully', 'green');
    document.getElementById('mob-m4-modal').style.display = 'none';
    document.getElementById('m4-task-text').value = '';
    document.getElementById('m4-planned-mh').value = '';
    document.getElementById('m4-deadline').value = '';
    document.getElementById('m4-remarks').value = '';
    document.getElementById('m4-shop-id').value = '{{ create_shop_id or "" }}';
    document.getElementById('m4-wp-id').value = '{{ create_work_package_id or "" }}';
    m4SetWorkerOptions('');

    var ac = document.getElementById('mob-ac-reg') ? document.getElementById('mob-ac-reg').value : '';
    var meetingDateFilter = (document.getElementById('m4-meeting-date') || {}).value || '';
    var searchFilter = (document.getElementById('m4-search-filter') || {}).value || '';
    var statusFilter = (document.getElementById('m4-status-filter') || {}).value || '';
    var quickFilter = (document.getElementById('m4-quick-filter') || {}).value || '';
    var filterParts = [];
    if (meetingDateFilter) filterParts.push('meeting_date=' + encodeURIComponent(meetingDateFilter));
    if (searchFilter) filterParts.push('search=' + encodeURIComponent(searchFilter));
    if (statusFilter) filterParts.push('status=' + encodeURIComponent(statusFilter));
    if (quickFilter) filterParts.push('quick=' + encodeURIComponent(quickFilter));
    var filterQuery = filterParts.length ? '&' + filterParts.join('&') : '';
    if (ac) {
      if (typeof mobLoadStage === 'function') {
        mobLoadStage('/tasks/entry/mobile/m2?ac=' + ac + filterQuery);
      } else if (typeof htmx !== 'undefined') {
        htmx.ajax('GET', '/tasks/entry/mobile/m2?ac=' + ac + filterQuery, { target: '#mob-entry-stage', swap: 'innerHTML' });
      }
    } else if (typeof htmx !== 'undefined') {
      htmx.ajax('GET', '/tasks/entry/mobile/m1' + (filterParts.length ? '?' + filterParts.join('&') : ''), { target: '#mob-entry-stage', swap: 'innerHTML' });
    }
  } catch (err) {
    showToast('Error', (err && err.message) || 'Failed to create task', 'red');
  } finally {
    mobCreateTaskInFlight = false;
    m4SetButtonBusy(submitBtn, false);
  }
}

m4SetWorkerOptions();
</script>
